name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VITE_DEPLOYMENT_MODE: free
      VITE_PUBLIC_APP_URL: https://packet-opt-control-tower.pages.dev
      PUBLIC_APP_URL: https://packet-opt-control-tower.pages.dev
      PUBLIC_SECURITY_CONTACT: mailto:security@packet-opt.example

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Release Env Check
        run: npm run release:check-env

      - name: Lint
        run: npm run lint

      - name: Smoke Test
        run: npm run smoke

      - name: E2E Release Check
        run: npm run test:e2e

      - name: Build
        run: npm run build
